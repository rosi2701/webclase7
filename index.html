<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>miau</title>
        <style>

            *{ 
                margin:0;
                padding:0;
            }

            :root{
                --fondo:#6500B3;
                --figura:#009405;
                --destaque:black;

            }

            body {
                font-family: Helvetica, Times New Roman, Arial, sans-serif;
                background: silver;
                color:var(--figura);
                background: var(--fondo);
            }

            #escondido{
                display: none;
            }

            div.contenedor{ 
                width: calc(100% - 2%);
                max-width: 600px;
                margin: 5% auto;
                padding: 3%;
                background: white;
                box-shadow: 0 0 3px gray;
                border-radius: 10px;
                /*text-align: center;*/
                
            }
            ul{
                list-style-position: inside;
                margin: 3%
            }
            ul li{
                margin:0.5rem, 0;
            }
            ul li a{
                margin-right:1rem;
                text-decoration: none;
                color:var(--destaque);
            }

        </style>
    </head>
    <body>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" id="escondido">
            <symbol id="bien" width="16" height="16" viewBox="0 0 16 16">
                <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
            </symbol>
            <symbol id="mal" width="16" height="16" viewBox="0 0 16 16">
                <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M4.5 6h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1m5 0h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1m-5 4h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1"/>
            </symbol>
        </svg>

        <div class="contenedor">
            <h1>Hola mundo</h1>
            <ul id="estudiantes"></ul>
        </div>
        <script>
            fetch("https://raw.githubusercontent.com/profesorfaco/opr/refs/heads/main/clase-07/registros.json")
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })

                .then((datos) => {
                    var trabajo = datos;
                    console.log("Datos recibidos:", trabajo);
                    const donde = document.getElementById("estudiantes");

                    //repita
                    trabajo.forEach((x) => {
                        var cuantos = [];
                        if (x.uno != "") {
                            cuantos.push(x.uno);
                        }
                        if (x.dos != "") {
                            cuantos.push(x.dos);
                        }
                        if (x.tres != "") {
                            cuantos.push(x.tres);
                        }
                        if (x.cuatro != "") {
                            cuantos.push(x.cuatro);
                        }
                        if (x.seis != "") {
                            cuantos.push(x.seis);
                        }

                        donde.innerHTML += `<li><a href="${x.cuenta}">${x.nombre}</a> ${pelotitas(cuantos)}</li>`;
                    });

                    function pelotitas(n) {
                        var armado = "";
                        n.forEach((e) => {
                            if(e[1]){
                                armado += `<a href="${e[0]}" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><use href="#bien" fill="#7510CC"/></svg></a>`;
                            } else {
                                armado += `<a href="${e[0]}" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><use href="#mal" fill="#009405"/></svg></a>`;
                            }
                        });
                        return armado;
                    }
                })

                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });
        </script>
    </body>
</html>
